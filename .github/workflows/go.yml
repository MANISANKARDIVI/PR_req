name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Notify Slack: Test Job Started
      - name: Notify Slack - Test Job Started
        uses: slackapi/slack-github-action@v2.0.0
        with:
          payload: |
            {
              "channel": "go-project-gha",
              "text": "🚀 Test job started for branch: ${{ github.ref_name }}."
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      # Checkout Code
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Go
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.2"

      # Install Dependencies
      - name: Install dependencies
        run: |
          go mod tidy
          go get -v ./...

      # Install the Application
      - name: Install the application
        run: go install ./...

      # Run Tests
      - name: Run tests
        run: go test -v ./...

      # Notify Slack: Test Job Success
      - name: Notify Slack - Test Job Successful
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          payload: |
            {
              "channel": "go-project-gha",
              "text": "✅ Test job completed successfully for branch: ${{ github.ref_name }}."
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      # Notify Slack: Test Job Failure
      - name: Notify Slack - Test Job Failed
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          payload: |
            {
              "channel": "go-project-gha",
              "text": "❌ Test job failed for branch: ${{ github.ref_name }}.\nWorkflow: ${{ github.workflow }}."
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      # Notify Slack: Build Job Started
      - name: Notify Slack - Build Job Started
        uses: slackapi/slack-github-action@v2.0.0
        with:
          payload: |
            {
              "channel": "go-project-gha",
              "text": "🏗️ Build job started for branch: ${{ github.ref_name }}."
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      # Checkout Code
      - name: Checkout code
        uses: actions/checkout@v4

      # Build the Application
      - name: Build the application
        run: go build -v -o dist/main ./...

      # Notify Slack: Build Job Success
      - name: Notify Slack - Build Job Successful
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          payload: |
            {
              "channel": "go-project-gha",
              "text": "✅ Build job completed successfully for branch: ${{ github.ref_name }}."
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      # Notify Slack: Build Job Failure
      - name: Notify Slack - Build Job Failed
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          payload: |
            {
              "channel": "go-project-gha",
              "text": "❌ Build job failed for branch: ${{ github.ref_name }}.\nWorkflow: ${{ github.workflow }}."
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  docker_build_push:
    runs-on: ubuntu-latest
    needs: build
    steps:
      # Notify Slack: Docker Job Started
      - name: Notify Slack - Docker Job Started
        uses: slackapi/slack-github-action@v2.0.0
        with:
          payload: |
            {
              "channel": "go-project-gha",
              "text": "📦 Docker job started for branch: ${{ github.ref_name }}."
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      # Checkout Code
      - name: Checkout code
        uses: actions/checkout@v4

      # Docker Login
      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build Docker Image
      - name: Build Docker image
        run: |
          docker build -t manisankardivi/new:latest .

      # Push Docker Image
      - name: Push Docker Image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push manisankardivi/new:latest

      # Notify Slack: Docker Job Success
      - name: Notify Slack - Docker Job Successful
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          payload: |
            {
              "channel": "go-project-gha",
              "text": "✅ Docker job completed successfully for branch: ${{ github.ref_name }}."
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      # Notify Slack: Docker Job Failure
      - name: Notify Slack - Docker Job Failed
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          payload: |
            {
              "channel": "go-project-gha",
              "text": "❌ Docker job failed for branch: ${{ github.ref_name }}.\nWorkflow: ${{ github.workflow }}."
            }
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
