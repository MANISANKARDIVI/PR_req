name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

jobs:
  create-pr:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.ref == 'dev' && github.event.pull_request.base.ref == 'main'
    steps:
      - name: Create PR
        uses: rematocorp/open-pull-request-action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          from-branch: ${{ github.event.pull_request.head.ref }}
          to-branch: ${{ github.event.pull_request.base.ref }}
          title: "Automated PR from ${{ github.event.pull_request.head.ref }} to ${{ github.event.pull_request.base.ref }}"
          body: "This PR was created automatically by the CI/CD pipeline."

  pipeline:
    runs-on: ubuntu-latest
    needs: create-pr
    if: github.event.pull_request.state == 'approved'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        run: go test -v ./...

      - name: Build and push Docker image
        run: |
          docker build -t manisankardivi/new:${{ env.VERSION }} .
          docker push manisankardivi/new:${{ env.VERSION }}

  check-pr-merged:
    runs-on: ubuntu-latest
    steps:
      - name: Check if pull request was merged
        run: |
          if [[ "${{ github.event.pull_request.merged }}" == 'true' ]]; then
            echo "PR was merged, proceeding with the pipeline."
          else
            echo "PR was not merged, skipping pipeline."
            exit 0  # Exit if not merged
          fi

  test:
    runs-on: ubuntu-latest
    needs: check-pr-merged
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.2"

      - name: Install dependencies
        run: |
          go mod tidy
          go get -v ./...

      - name: Install the application
        run: go install ./...

      - name: Run tests
        run: go test -v ./... || exit 1

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build the application
        run: go build -v -o dist/main ./...

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-build-artifact
          path: dist/main
          if-no-files-found: warn

      - name: Checking artifact
        run: |
          ls -la
          tree dist

  docker_build_push:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Read version from VERSION file
        id: read_version
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION | xargs)
            echo "VERSION=$VERSION" >> $GITHUB_ENV
          else
            echo "VERSION file not found!"
            exit 1
          fi

      - name: Build and push Docker image
        run: |
          docker build -t manisankardivi/new:${{ env.VERSION }} .
          docker push manisankardivi/new:${{ env.VERSION }}

  k8s-manifest-files_update:
    runs-on: ubuntu-latest
    needs: docker_build_push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version from VERSION file
        run: |
          VERSION=$(cat VERSION)
          echo "Version extracted: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV  # Save version to environment variable

      - name: Checkout Kubernetes repo
        run: |
          git clone https://x-access-token:${{ secrets.PERSONAL_ACCESS_TOKEN }}@github.com/MANISANKARDIVI/k8s_repo.git
          cd k8s_repo

          # Replace the image version in manifest.yaml with the extracted version
          sed -i "s|image: manisankardivi/new:.*|image: manisankardivi/new:$VERSION|" manifest.yaml

          # Display the image section (line containing image: manisankardivi/new:)
          echo "Image Section:"
          grep "image: manisankardivi/new:" manifest.yaml

      - name: Check for changes and commit if updated
        run: |
          cd k8s_repo
          git config --global user.email "manisankardivi@gmail.com"
          git config --global user.name "manisankardivi"
          git add manifest.yaml

          if git diff --cached --exit-code --quiet; then
            echo "Version Not Updated"
          else
            echo "Version Updated"
            git commit -m "Updated manifest.yaml with version $VERSION | GitHub Actions Pipeline"
            git push origin main
          fi
