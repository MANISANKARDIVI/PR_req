---
name: CI/CD Pipeline
on:
  push:
    branches:
      - dev
jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Pull Request from dev to main
        uses: peter-evans/create-pull-request@v7
        with:
          github-token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          from-branch: dev
          to-branch: main
          title: Automated PR from dev to main
          body:
            This PR was created automatically by the CI/CD pipeline. Please review and
            merge.
          draft: false
  check-pr-merged:
    runs-on: ubuntu-latest
    needs: create-pr
    steps:
      - name: Wait for PR merge
        run: >
          PR_NUMBER="${{ steps.create-pr.outputs.pull_number }}"

          PR_STATUS=$(curl -s -H "Authorization: token ${{ secrets.PERSONAL_ACCESS_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/$PR_NUMBER" | jq -r '.merged')

          # Proceed only if PR is merged

          if [ "$PR_STATUS" != "true" ]; then
            echo "PR was not merged, skipping pipeline."
            exit 0  # Exit if PR not merged
          fi

          echo "PR was merged, proceeding with the pipeline."
  pipeline:
    runs-on: ubuntu-latest
    needs: check-pr-merged
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.2
      - name: Install dependencies
        run: |
          go mod tidy
          go get -v ./...
      - name: Run tests
        run: go test -v ./... || exit 1
  docker_build_push:
    runs-on: ubuntu-latest
    needs: pipeline
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Read version from VERSION file
        id: read_version
        run: |
          if [ -f VERSION ]; then
            VERSION=$(cat VERSION | xargs)
            echo "VERSION=$VERSION" >> $GITHUB_ENV
          else
            echo "VERSION file not found!"
            exit 1
          fi
      - name: Build and push Docker image
        run: |
          docker build -t manisankardivi/new:${{ env.VERSION }} .
          docker push manisankardivi/new:${{ env.VERSION }}
  k8s-manifest-files_update:
    runs-on: ubuntu-latest
    needs: docker_build_push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Read version from VERSION file
        run: |
          VERSION=$(cat VERSION)
          echo "Version extracted: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      - name: Checkout Kubernetes repo
        run: >
          git clone https://x-access-token:${{ secrets.PERSONAL_ACCESS_TOKEN
          }}@github.com/MANISANKARDIVI/k8s_repo.git

          cd k8s_repo

          sed -i "s|image: manisankardivi/new:.*|image: manisankardivi/new:$VERSION|" manifest.yaml

          echo "Image Section:"

          grep "image: manisankardivi/new:" manifest.yaml
      - name: Check for changes and commit if updated
        run: >
          cd k8s_repo

          git config --global user.email "manisankardiv@gmail.com"

          git config --global user.name "manisankardiv"

          git add manifest.yaml

          if git diff --cached --exit-code --quiet; then
            echo "Version Not Updated"
          else
            echo "Version Updated"
            git commit -m "Updated manifest.yaml with version $VERSION | GitHub Actions Pipeline"
            git push origin main
          fi
