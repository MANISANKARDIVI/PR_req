---
name: CI Pipeline
on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.23.2
      - name: Install dependencies
        run: |
          go mod tidy
          go get -v ./...
      - name: Run tests
        run: go test -v ./...
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build the application
        run: go build -v -o dist/main ./...
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-build-artifact
          path: dist/main
          if-no-files-found: warn
  docker_build_push:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Docker login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        run: |
          VERSION=${{ env.VERSION }}
          echo "Building and pushing image with tag: $VERSION"
          docker build -t manisankardivi/new:$VERSION .
          docker push manisankardivi/new:$VERSION
  k8s-manifest-files_update:
    runs-on: ubuntu-latest
    needs: docker_build_push
    steps:
      - name: Checkout Kubernetes repo
        run: >
          git clone https://x-access-token:${{ secrets.PERSONAL_ACCESS_TOKEN
          }}@github.com/MANISANKARDIVI/k8s_repo.git

          cd k8s_repo

          VERSION=${{ env.VERSION }}

          sed -i "s|image: manisankardivi/new:.*|image: manisankardivi/new:$VERSION|" manifest.yaml

          git add manifest.yaml

          git commit -m "Updated manifest.yaml with version $VERSION"

          git push origin main

  open_pr:
    runs-on: ubuntu-latest
    needs: k8s-manifest-files_update
    steps:
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN}}
          branch: dev
          base: main
          title: Merge dev to main
          body: Automated PR to merge dev into main.
